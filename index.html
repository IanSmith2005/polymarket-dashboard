<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arb Bot Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'SF Pro Display', -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 24px 32px; border-bottom: 1px solid #1e2433; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    header h1 span { color: #6366f1; }
    #last-updated { font-size: 12px; color: #64748b; }
    .live-dot { display: inline-block; width: 7px; height: 7px; background: #22c55e; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #161b27; border: 1px solid #1e2433; border-radius: 12px; padding: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
    .badge-live { background: #14532d; color: #4ade80; }
    .badge-paper { background: #1e3a5f; color: #60a5fa; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .stat label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
    .stat .value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .stat .value.green { color: #4ade80; }
    .stat .value.red { color: #f87171; }
    .stat .value.white { color: #f1f5f9; }
    .win-bar { height: 4px; background: #1e2433; border-radius: 2px; margin-top: 16px; }
    .win-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #6366f1, #4ade80); transition: width 0.5s; }

    .section-title { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .trades-table { background: #161b27; border: 1px solid #1e2433; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1e2433; }
    td { padding: 12px 16px; border-bottom: 1px solid #1e2433; color: #cbd5e1; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a2030; }
    .outcome-win { color: #4ade80; font-weight: 600; }
    .outcome-loss { color: #f87171; font-weight: 600; }
    .outcome-pending { color: #facc15; }
    .pnl-pos { color: #4ade80; }
    .pnl-neg { color: #f87171; }

    .empty { text-align: center; padding: 40px; color: #475569; font-size: 14px; }
    .loading { text-align: center; padding: 80px; color: #475569; }
    .error-msg { background: #2d1515; border: 1px solid #7f1d1d; border-radius: 8px; padding: 16px; margin-bottom: 24px; color: #fca5a5; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1><span>◈</span> Arb Bot Dashboard</h1>
    <div id="last-updated">Loading...</div>
  </header>

  <div class="container">
    <div id="error" style="display:none" class="error-msg"></div>
    <div id="cards" class="cards"></div>
    <div class="section-title">Recent Trades</div>
    <div class="trades-table">
      <div id="trades-body"><div class="loading">Loading trades...</div></div>
    </div>
  </div>

  <script>
    const OWNER = 'IanSmith2005';
    const REPO  = 'polymarket-dashboard';
    const RAW   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data`;

    const BOTS = [
      { key: 'btc_live',  label: 'BTC Live',  file: 'btc_live_ledger.jsonl',  badge: 'live',  asset: 'BTC' },
      { key: 'btc_paper', label: 'BTC Paper', file: 'btc_paper_ledger.jsonl', badge: 'paper', asset: 'BTC' },
      { key: 'eth_paper', label: 'ETH Paper', file: 'eth_paper_ledger.jsonl', badge: 'paper', asset: 'ETH' },
    ];

    async function fetchLedger(filename) {
      const r = await fetch(`${RAW}/${filename}?t=${Date.now()}`);
      if (!r.ok) return [];
      const text = await r.text();
      return text.trim().split('\n').filter(Boolean).map(l => {
        try { return JSON.parse(l); } catch { return null; }
      }).filter(Boolean);
    }

    function stats(records) {
      const done    = records.filter(r => r.resolved);
      const pending = records.filter(r => !r.resolved);
      const wins    = done.filter(r => r.outcome === 'WIN');
      const pnl     = done.reduce((s, r) => s + (r.pnl || 0), 0);
      const stake   = records[0]?.stake || 2;
      const roi     = done.length ? pnl / (done.length * stake) * 100 : 0;
      const winRate = done.length ? wins.length / done.length * 100 : 0;
      return { total: records.length, done: done.length, pending: pending.length, wins: wins.length, losses: done.length - wins.length, pnl, roi, winRate, stake };
    }

    function renderCard(bot, s) {
      const pnlClass = s.pnl >= 0 ? 'green' : 'red';
      const roiSign  = s.roi >= 0 ? '+' : '';
      return `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${bot.label}</span>
            <span class="badge badge-${bot.badge}">${bot.badge.toUpperCase()}</span>
          </div>
          <div class="stats-grid">
            <div class="stat">
              <label>PnL</label>
              <div class="value ${pnlClass}">$${s.pnl >= 0 ? '+' : ''}${s.pnl.toFixed(2)}</div>
            </div>
            <div class="stat">
              <label>ROI</label>
              <div class="value ${pnlClass}">${roiSign}${s.roi.toFixed(1)}%</div>
            </div>
            <div class="stat">
              <label>Win Rate</label>
              <div class="value white">${s.winRate.toFixed(0)}%</div>
            </div>
            <div class="stat">
              <label>Trades</label>
              <div class="value white">${s.done}<span style="color:#64748b;font-size:14px"> / ${s.total}</span></div>
            </div>
          </div>
          <div class="win-bar">
            <div class="win-bar-fill" style="width:${s.winRate}%"></div>
          </div>
        </div>`;
    }

    function renderTrades(allTrades) {
      const sorted = allTrades.sort((a, b) => new Date(b.ts) - new Date(a.ts)).slice(0, 30);
      if (!sorted.length) return '<div class="empty">No trades yet.</div>';
      const rows = sorted.map(r => {
        const ts      = r.ts.slice(0, 16).replace('T', ' ');
        const asset   = r.kalshi_ticker?.startsWith('KXETH') ? 'ETH' : 'BTC';
        const outcome = r.resolved
          ? (r.outcome === 'WIN' ? '<span class="outcome-win">WIN</span>' : '<span class="outcome-loss">LOSS</span>')
          : '<span class="outcome-pending">PENDING</span>';
        const pnl = r.resolved
          ? `<span class="${r.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">$${r.pnl >= 0 ? '+' : ''}${r.pnl?.toFixed(2)}</span>`
          : '—';
        const dz = `$${(r.dead_zone || 0).toFixed(0)}`;
        return `<tr>
          <td>${ts}</td>
          <td>${asset}</td>
          <td>${r.trade?.replace('_Poly + ', ' + ').replace('_Kalshi', '')}</td>
          <td>${r.cost?.toFixed(3)}</td>
          <td>${dz}</td>
          <td>+${r.profit_pct?.toFixed(1)}%</td>
          <td>${outcome}</td>
          <td>${pnl}</td>
        </tr>`;
      }).join('');
      return `<table>
        <thead><tr>
          <th>Time (UTC)</th><th>Asset</th><th>Trade</th><th>Cost</th><th>Dead Zone</th><th>Target</th><th>Result</th><th>PnL</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    async function load() {
      try {
        const results = await Promise.all(BOTS.map(b => fetchLedger(b.file)));
        const allTrades = [];

        document.getElementById('cards').innerHTML = BOTS.map((bot, i) => {
          const records = results[i];
          records.forEach(r => allTrades.push(r));
          const s = stats(records);
          return renderCard(bot, s);
        }).join('');

        document.getElementById('trades-body').innerHTML = renderTrades(allTrades);
        document.getElementById('last-updated').innerHTML =
          `<span class="live-dot"></span>Updated ${new Date().toUTCString().slice(17, 25)} UTC`;
      } catch (e) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = `Error loading data: ${e.message}`;
      }
    }

    load();
    setInterval(load, 5 * 60 * 1000); // refresh every 5 min
  </script>
</body>
</html>
