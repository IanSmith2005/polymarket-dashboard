<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arb Bot</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #7c3aed;
      --blue:   #3b82f6;
      --green:  #10d9a0;
      --red:    #f43f5e;
      --yellow: #fbbf24;

      --bg:      #07061a;
      --surface: #0f0d27;
      --surface2:#161330;
      --border:  rgba(255,255,255,0.07);

      --text:  #f0efff;
      --text2: rgba(180,178,220,0.75);
      --text3: rgba(120,118,165,0.6);

      --grad: linear-gradient(135deg, #7c3aed, #3b82f6);
      --r:    16px;
      --r-sm: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .app  { display: flex; min-height: 100vh; }
    .main { flex: 1; padding: 24px 28px 40px 20px; overflow-y: auto; }

    /* Sidebar */
    .sidebar {
      width: 230px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sb-brand {
      padding: 22px 18px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .sb-logo {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--grad); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
    }
    .sb-name { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
    .sb-sub  { font-size: 11px; color: var(--text3); font-weight: 500; margin-top: 1px; }
    .sb-nav  { flex: 1; padding: 10px; }
    .nav-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: 1.8px; color: var(--text3); padding: 14px 10px 5px; font-weight: 700; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; cursor: pointer;
      color: var(--text2); font-size: 13px; font-weight: 500;
      border-radius: var(--r-sm);
      margin-bottom: 1px; position: relative;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: rgba(124,58,237,0.18);
      color: #fff; font-weight: 600;
    }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 20%; height: 60%;
      width: 3px; background: var(--grad); border-radius: 0 3px 3px 0;
    }
    .nav-ico {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; background: rgba(255,255,255,0.06);
    }
    .nav-item.active .nav-ico { background: var(--grad); }
    .nav-badge {
      margin-left: auto; font-size: 9px; padding: 2px 8px;
      border-radius: 20px; font-weight: 700; letter-spacing: 0.6px; flex-shrink: 0;
    }
    .nav-badge.live  { background: rgba(16,217,160,0.12); color: var(--green); border: 1px solid rgba(16,217,160,0.2); }
    .nav-badge.paper { background: rgba(251,191,36,0.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.18); }
    .sb-foot {
      padding: 14px 18px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 8px;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--green); }

    /* Page header */
    .pg-hdr  { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .pg-title{ font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
    .pill    { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
    .pill.live  { background: rgba(16,217,160,0.12); color: var(--green); border: 1px solid rgba(16,217,160,0.2); }
    .pill.paper { background: rgba(251,191,36,0.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.18); }
    .pg-meta { margin-left: auto; font-size: 11px; color: var(--text3); font-weight: 500; }

    /* Cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 16px; }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px 22px;
    }
    .kpi-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .kpi-ico {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .kpi-ico.p { background: rgba(124,58,237,0.15); }
    .kpi-ico.b { background: rgba(59,130,246,0.14); }
    .kpi-ico.g { background: rgba(16,217,160,0.12); }
    .kpi-ico.k { background: rgba(236,72,153,0.12); }
    .kpi-lbl { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; }
    .kpi-val { font-size: 26px; font-weight: 900; letter-spacing: -1.2px; line-height: 1; }
    .kpi-val.pos { color: var(--green); }
    .kpi-val.neg { color: var(--red); }
    .kpi-val.neu { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 6px; font-weight: 500; }

    /* Two col */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
    }
    .card-ttl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 16px; }

    /* Outcome */
    .out-bar { display: flex; height: 5px; border-radius: 10px; overflow: hidden; gap: 2px; margin-bottom: 14px; }
    .out-seg { border-radius: 10px; }
    .out-seg.fh { background: var(--green); }
    .out-seg.cv { background: var(--blue); }
    .out-seg.ls { background: var(--red); }
    .out-seg.po { background: var(--yellow); }
    .out-leg { display: flex; gap: 14px; flex-wrap: wrap; }
    .leg-i   { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--text2); font-weight: 500; }
    .leg-d   { width: 8px; height: 8px; border-radius: 3px; }
    .leg-n   { font-weight: 700; color: var(--text); }

    /* Stats */
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-lbl { font-size: 12px; color: var(--text2); font-weight: 500; }
    .stat-val { font-size: 13px; font-weight: 700; }

    /* Chart */
    .chart-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px; margin-bottom: 16px;
      border-top: 2px solid var(--purple);
    }
    .chart-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .chart-ttl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
    .chart-num { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-top: 4px; }

    /* Log */
    .log-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .log-hdr { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .log-ttl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
    .log-ct  { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .log-scr { max-height: 420px; overflow-y: auto; }
    .log-scr::-webkit-scrollbar { width: 4px; }
    .log-scr::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .log-tbl { width: 100%; border-collapse: collapse; }
    .log-tbl th { text-align: left; padding: 9px 14px; font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 700; border-bottom: 1px solid var(--border); background: var(--surface2); position: sticky; top: 0; z-index: 1; }
    .log-tbl td { padding: 11px 14px; font-size: 12px; border-bottom: 1px solid var(--border); font-weight: 500; color: var(--text2); }
    .log-tbl tr:hover td { background: var(--surface2); color: var(--text); }
    .log-tbl tr:last-child td { border-bottom: none; }

    .badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; display: inline-block; }
    .badge.fh  { background: rgba(16,217,160,0.12); color: var(--green); border: 1px solid rgba(16,217,160,0.18); }
    .badge.cv  { background: rgba(59,130,246,0.12);  color: #60a5fa;     border: 1px solid rgba(59,130,246,0.18); }
    .badge.ls  { background: rgba(244,63,94,0.12);   color: var(--red);  border: 1px solid rgba(244,63,94,0.18); }
    .badge.pnd { background: var(--surface2);         color: var(--text3); border: 1px solid var(--border); }

    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; }
    .dot.ok { background: var(--green); }
    .dot.no { background: var(--red); }
    .pnl-cell { font-weight: 700; font-variant-numeric: tabular-nums; }
    .pnl-cell.pos { color: var(--green); }
    .pnl-cell.neg { color: var(--red); }

    /* Overview hero */
    .hero {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 28px 32px; margin-bottom: 16px;
      display: flex; align-items: center;
      border-top: 2px solid var(--purple);
    }
    .hero-main  { flex: 1; }
    .hero-eye   { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 8px; }
    .hero-pnl   { font-size: 48px; font-weight: 900; letter-spacing: -2.5px; line-height: 1; }
    .hero-pnl.pos { color: var(--green); }
    .hero-pnl.neg { color: var(--red); }
    .hero-cap   { font-size: 12px; color: var(--text3); margin-top: 8px; font-weight: 500; }
    .hero-div   { width: 1px; background: var(--border); align-self: stretch; margin: 0 32px; }
    .hero-stats { display: flex; gap: 32px; }
    .hs-val { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .hs-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }

    /* Bot cards */
    .sec-lbl   { font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
    .bots-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
    .bot-card  {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px; cursor: pointer;
    }
    .bot-card:hover { background: var(--surface2); border-color: rgba(124,58,237,0.35); }
    .bc-hdr   { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .bc-name  { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .bc-ico   { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .bc-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .bc-val   { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .bc-lbl   { font-size: 10.5px; color: var(--text3); margin-top: 2px; font-weight: 500; }
    .bc-val.pos { color: var(--green); }
    .bc-val.neg { color: var(--red); }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; height: 400px; gap: 10px; color: var(--text3); font-size: 13px; font-weight: 500; }

    @media(max-width:1100px){ .kpi-grid{grid-template-columns:repeat(2,1fr)} .row2{grid-template-columns:1fr} }
    @media(max-width:768px) { .sidebar{display:none} .main{padding:16px} .kpi-grid{grid-template-columns:1fr} .bots-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">AB</div>
      <div>
        <div class="sb-name">Arb Bot</div>
        <div class="sb-sub">Cross-platform</div>
      </div>
    </div>
    <div class="sb-nav">
      <div class="nav-lbl">General</div>
      <div class="nav-item active" data-page="overview" onclick="nav('overview')">
        <div class="nav-ico">⊞</div> Overview
      </div>
      <div class="nav-lbl">Live</div>
      <div class="nav-item" data-page="btc_hourly" onclick="nav('btc_hourly')">
        <div class="nav-ico">₿</div> BTC Hourly
        <span class="nav-badge live">LIVE</span>
      </div>
      <div class="nav-item" data-page="eth_live" onclick="nav('eth_live')">
        <div class="nav-ico">Ξ</div> ETH Hourly
        <span class="nav-badge live">LIVE</span>
      </div>
      <div class="nav-lbl">Paper</div>
      <div class="nav-item" data-page="btc_15min" onclick="nav('btc_15min')">
        <div class="nav-ico">15</div> BTC 15-min
        <span class="nav-badge paper">PAPER</span>
      </div>
      <div class="nav-item" data-page="eth_dry_run" onclick="nav('eth_dry_run')">
        <div class="nav-ico">Ξ</div> ETH Dry Run
        <span class="nav-badge paper">PAPER</span>
      </div>
      <div class="nav-item" data-page="sol_dry_run" onclick="nav('sol_dry_run')">
        <div class="nav-ico">◎</div> SOL Hourly
        <span class="nav-badge paper">PAPER</span>
      </div>
    </div>
    <div class="sb-foot">
      <div class="live-dot"></div> Syncing every 15 min
    </div>
  </nav>

  <div class="main" id="main">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
const DATA = 'https://raw.githubusercontent.com/IanSmith2005/polymarket-dashboard/main/data';

const BOTS = {
  btc_hourly:  { label:'BTC Hourly Bot',  ico:'₿',  status:'live'  },
  eth_live:    { label:'ETH Hourly Bot',  ico:'Ξ',  status:'live'  },
  btc_15min:   { label:'BTC 15-min Bot',  ico:'15', status:'paper' },
  eth_dry_run: { label:'ETH Dry Run',     ico:'Ξ',  status:'paper' },
  sol_dry_run: { label:'SOL Hourly Bot',  ico:'◎',  status:'paper' },
};

let curPage = 'overview';
let chartInst = null;

async function load(f) {
  try {
    const r = await fetch(`${DATA}/${f}.json?t=${Date.now()}`);
    if (!r.ok) throw r.status;
    return r.json();
  } catch(e) { return null; }
}

const fts = t => {
  if (!t) return '—';
  const d = new Date(t);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
};

const sgn = v => v==null ? '—' : (v>=0?'+$':'-$')+Math.abs(v).toFixed(2);
const cls = v => v==null ? '' : v>=0 ? 'pos' : 'neg';

const hBadge = t => ({'FULL_HEDGE':'<span class="badge fh">Full Hedge</span>','COVERED':'<span class="badge cv">Covered</span>','LOSS':'<span class="badge ls">Loss</span>','PENDING':'<span class="badge pnd">Pending</span>'}[t]||t);

function byHour(trades) {
  const g = {};
  for (const t of trades) {
    if (!t.ts) continue;
    const k = t.ts.slice(0,13);
    (g[k]=g[k]||[]).push(t);
  }
  return Object.values(g).map(arr => {
    const n = arr.length;
    const pnl = arr.reduce((s,t)=>s+(t.pnl_adjusted||0),0);
    const types = arr.map(t=>t.hedge_type);
    const badge = types.includes('LOSS') ? hBadge('LOSS') : types.includes('FULL_HEDGE') ? hBadge('FULL_HEDGE') : types.includes('PENDING') ? hBadge('PENDING') : hBadge('COVERED');
    return {
      time:fts(arr[0].ts), trade:arr[0].trade||'—', n,
      avgCost:(arr.reduce((s,t)=>s+(t.cost||0),0)/n).toFixed(2),
      avgP:(arr.reduce((s,t)=>s+(t.profit_pct_raw||0),0)/n).toFixed(1),
      avgDz:Math.round(arr.reduce((s,t)=>s+(t.dead_zone||0),0)/n),
      polyOk:arr.every(t=>t.poly_ok), kOk:arr.every(t=>t.kalshi_ok),
      badge, pnl
    };
  });
}

async function renderOverview() {
  const d = await load('overview');
  if (!d) { document.getElementById('main').innerHTML='<div class="loading">Failed to load</div>'; return; }

  const wp  = d.wallet_pnl;
  const pct = d.wallet_pct;
  const dep = d.deposited||0;
  const tot = d.total;
  const liveBots = (d.bots||[]).filter(b=>b.status==='live');
  const liveWins = liveBots.reduce((s,b)=>s+b.wins,0);
  const liveResolved = liveBots.reduce((s,b)=>s+b.resolved,0);
  const liveBot = { win_rate: liveResolved ? liveWins/liveResolved*100 : 0 };

  const cards = (d.bots||[]).map(b => {
    const m = BOTS[b.id]||{ ico:'?', label:b.id };
    return `
    <div class="bot-card" onclick="nav('${b.id}')">
      <div class="bc-hdr">
        <div class="bc-name"><div class="bc-ico">${m.ico}</div>${m.label.replace(' Bot','')}</div>
        <span class="nav-badge ${b.status}">${b.status.toUpperCase()}</span>
      </div>
      <div class="bc-stats">
        <div>
          <div class="bc-val ${cls(b.trade_pnl)}">${sgn(b.trade_pnl)}</div>
          <div class="bc-lbl">Trade PnL</div>
        </div>
        <div>
          <div class="bc-val">${b.win_rate.toFixed(0)}%</div>
          <div class="bc-lbl">Win Rate</div>
        </div>
        <div>
          <div class="bc-val">${b.trades}</div>
          <div class="bc-lbl">Trades${b.pending>0?` <span style="color:var(--yellow);font-size:10px">(${b.pending}↗)</span>`:''}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">Overview</div>
      <div class="pg-meta">Updated ${fts(d.updated_at)}</div>
    </div>

    <div class="hero">
      <div class="hero-main">
        <div class="hero-eye">Real Portfolio · Live Bots</div>
        <div class="hero-pnl ${cls(wp)}">${sgn(wp)}</div>
        <div class="hero-cap">
          ${pct!=null?(wp>=0?'+':'')+pct+'% return &nbsp;·&nbsp; ':''} Deposited $${dep.toFixed(2)} &nbsp;·&nbsp; Current ${tot!=null?'$'+tot.toFixed(2):'—'}
        </div>
      </div>
      <div class="hero-div"></div>
      <div class="hero-stats">
        <div>
          <div class="hs-val" style="color:var(--green)">${liveBot.win_rate?.toFixed(0)||0}%</div>
          <div class="hs-lbl">Live Win Rate</div>
        </div>
        <div>
          <div class="hs-val">${(d.bots||[]).reduce((s,b)=>s+b.resolved,0)}</div>
          <div class="hs-lbl">Total Resolved</div>
        </div>
        <div>
          <div class="hs-val">${(d.bots||[]).reduce((s,b)=>s+b.pending,0)}</div>
          <div class="hs-lbl">Live Positions</div>
        </div>
      </div>
    </div>

    <div class="sec-lbl">All Bots</div>
    <div class="bots-grid">${cards}</div>`;
}

async function renderBot(pg) {
  const d = await load(pg);
  if (!d) { document.getElementById('main').innerHTML='<div class="loading">Failed to load</div>'; return; }

  const meta  = BOTS[pg]||{ label:pg, status:d.status };
  const k     = d.kpis;
  const w     = d.wallets||{};
  const sc    = d.status==='live'?'live':'paper';
  const sl    = d.status==='live'?'LIVE':'PAPER';
  const tot   = (k.full_hedge||0)+(k.covered||0)+(k.loss||0)+(k.poly_only||0);
  const fhP   = tot?k.full_hedge/tot*100:0;
  const cvP   = tot?k.covered/tot*100:0;
  const lsP   = tot?k.loss/tot*100:0;
  const poP   = tot?k.poly_only/tot*100:0;
  const cum   = d.cumulative_pnl||[];
  const lastP = cum.length?cum[cum.length-1].cumulative:0;
  const isLive= d.status==='live';
  const showP = isLive?(w.wallet_pnl??lastP):lastP;
  const pLbl  = isLive?'Wallet PnL':'Paper PnL';
  const pSub  = isLive?(w.total!=null?`Balance $${w.total.toFixed(2)} · Deposited $${(w.deposited||0).toFixed(2)}`:`${k.resolved||0} resolved trades`):`${k.resolved||0} resolved trades`;

  document.getElementById('main').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">${meta.label}</div>
      <div class="pill ${sc}">${sl}</div>
      <div class="pg-meta">Updated ${fts(d.updated_at)}</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-top"><div class="kpi-ico g">$</div><div class="kpi-lbl">${pLbl}</div></div>
        <div class="kpi-val ${cls(showP)}">${sgn(showP)}</div>
        <div class="kpi-sub">${pSub}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top"><div class="kpi-ico p">%</div><div class="kpi-lbl">Win Rate</div></div>
        <div class="kpi-val neu">${k.win_rate?.toFixed(1)||0}%</div>
        <div class="kpi-sub">${k.wins||0} wins · ${k.losses||0} losses</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top"><div class="kpi-ico b">≈</div><div class="kpi-lbl">Avg PnL / Trade</div></div>
        <div class="kpi-val ${cls(k.avg_pnl_per_trade)}">${sgn(k.avg_pnl_per_trade)}</div>
        <div class="kpi-sub">Avg raw profit ${k.avg_profit_pct_raw?.toFixed(1)||0}%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top"><div class="kpi-ico k">⛓</div><div class="kpi-lbl">Hedge Rate</div></div>
        <div class="kpi-val neu">${k.both_filled_rate?.toFixed(0)||0}%</div>
        <div class="kpi-sub">${k.poly_only||0} unhedged (poly-only)</div>
      </div>
    </div>

    <div class="row2">
      <div class="card">
        <div class="card-ttl">Outcome Distribution</div>
        <div class="out-bar">
          ${fhP>0?`<div class="out-seg fh" style="flex:${fhP}"></div>`:''}
          ${cvP>0?`<div class="out-seg cv" style="flex:${cvP}"></div>`:''}
          ${poP>0?`<div class="out-seg po" style="flex:${poP}"></div>`:''}
          ${lsP>0?`<div class="out-seg ls" style="flex:${lsP}"></div>`:''}
        </div>
        <div class="out-leg">
          <div class="leg-i"><div class="leg-d" style="background:var(--green)"></div>Full Hedge <span class="leg-n">${k.full_hedge||0}</span></div>
          <div class="leg-i"><div class="leg-d" style="background:var(--blue)"></div>Covered <span class="leg-n">${k.covered||0}</span></div>
          <div class="leg-i"><div class="leg-d" style="background:var(--yellow)"></div>Poly Only <span class="leg-n">${k.poly_only||0}</span></div>
          <div class="leg-i"><div class="leg-d" style="background:var(--red)"></div>Loss <span class="leg-n">${k.loss||0}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-ttl">Stats</div>
        <div class="stat-row"><span class="stat-lbl">Total Trades</span><span class="stat-val">${k.total_trades||0}</span></div>
        <div class="stat-row"><span class="stat-lbl">Resolved</span><span class="stat-val">${k.resolved||0}</span></div>
        <div class="stat-row"><span class="stat-lbl">Both Legs Filled</span><span class="stat-val">${k.both_filled_rate?.toFixed(1)||0}%</span></div>
        <div class="stat-row"><span class="stat-lbl">Avg Raw Profit</span><span class="stat-val">${k.avg_profit_pct_raw?.toFixed(1)||0}%</span></div>
        <div class="stat-row"><span class="stat-lbl">Full Hedges</span><span class="stat-val" style="color:var(--green)">${k.full_hedge||0}</span></div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-hdr">
        <div>
          <div class="chart-ttl">Cumulative PnL</div>
          <div class="chart-num ${cls(lastP)}">${sgn(lastP)}</div>
        </div>
      </div>
      <canvas id="pnlChart" height="88"></canvas>
    </div>

    <div class="log-wrap">
      <div class="log-hdr">
        <div class="log-ttl">Trade History</div>
        <div class="log-ct">${d.trades?.length||0} trades</div>
      </div>
      <div class="log-scr">
        <table class="log-tbl">
          <thead><tr>
            <th>Time</th><th>Direction</th><th>Cost</th><th>Profit</th>
            <th>Dead Zone</th><th>Fills</th><th>Outcome</th><th>PnL</th>
          </tr></thead>
          <tbody>
            ${byHour(d.trades||[]).map(g=>`
              <tr>
                <td>${g.time}</td>
                <td style="color:var(--text);font-weight:600">${g.trade}${g.n>1?` <span style="color:#a78bfa;font-size:10px">×${g.n}</span>`:''}</td>
                <td>$${g.avgCost}</td>
                <td>${g.avgP}%</td>
                <td>$${g.avgDz}</td>
                <td>
                  <span class="dot ${g.polyOk?'ok':'no'}"></span>Poly
                  <span class="dot ${g.kOk?'ok':'no'}" style="margin-left:6px"></span>Kalshi
                </td>
                <td>${g.badge}</td>
                <td class="pnl-cell ${cls(g.pnl)}">${sgn(g.pnl)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  drawChart(cum, lastP);
}

function drawChart(cum, lastVal) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const canvas = document.getElementById('pnlChart');
  if (!canvas || !cum.length) return;
  const labels = cum.map(d=>{const dt=new Date(d.ts);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});});
  const vals = cum.map(d=>d.cumulative);
  const ctx = canvas.getContext('2d');
  const h = canvas.parentElement.clientHeight||200;
  const isPos = (lastVal||0) >= 0;
  const lc = isPos ? '#10d9a0' : '#f43f5e';
  const grad = ctx.createLinearGradient(0,0,0,h);
  if (isPos) { grad.addColorStop(0,'rgba(16,217,160,0.18)'); grad.addColorStop(1,'rgba(16,217,160,0)'); }
  else       { grad.addColorStop(0,'rgba(244,63,94,0.16)');  grad.addColorStop(1,'rgba(244,63,94,0)'); }

  chartInst = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[{ data:vals, borderColor:lc, backgroundColor:grad, fill:true, tension:0.4, pointRadius:0, pointHoverRadius:4, pointHoverBackgroundColor:lc, pointHoverBorderColor:'#fff', pointHoverBorderWidth:2, borderWidth:2 }] },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#0f0d27',titleColor:'rgba(120,118,165,0.7)',bodyColor:'#f0efff',borderColor:'rgba(255,255,255,0.07)',borderWidth:1,cornerRadius:10,padding:10,bodyFont:{weight:'700',size:13,family:'Inter'},callbacks:{label:c=>(c.parsed.y>=0?'+$':'-$')+Math.abs(c.parsed.y).toFixed(2)}}
      },
      scales:{
        x:{ticks:{color:'rgba(120,118,165,0.6)',maxTicksLimit:7,font:{size:10,family:'Inter'}},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
        y:{ticks:{color:'rgba(120,118,165,0.6)',font:{size:10,family:'Inter'},callback:v=>(v>=0?'+$':'-$')+Math.abs(v).toFixed(0)},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}}
      },
      interaction:{intersect:false,mode:'index'}
    }
  });
}

function nav(pg) {
  curPage = pg;
  window.location.hash = '#/'+pg.replace(/_/g,'-');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===pg));
  document.getElementById('main').innerHTML = '<div class="loading">Loading…</div>';
  if (pg==='overview') renderOverview();
  else renderBot(pg);
}

function handleHash() {
  const h = window.location.hash.replace('#/','').replace(/-/g,'_').replace('#','');
  const valid = ['overview','btc_hourly','eth_live','btc_15min','eth_dry_run','sol_dry_run'];
  nav(valid.includes(h)?h:'overview');
}

window.addEventListener('hashchange', handleHash);
handleHash();
setInterval(()=>curPage==='overview'?renderOverview():renderBot(curPage), 300000);
</script>
</body>
</html>
