<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Arb Bot</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --purple: #7c3aed; --blue: #3b82f6; --green: #10d9a0; --red: #f43f5e; --yellow: #fbbf24;
      --bg: #07061a; --surface: #0f0d27; --surface2: #161330; --border: rgba(255,255,255,0.07);
      --text: #f0efff; --text2: rgba(180,178,220,0.75); --text3: rgba(120,118,165,0.6);
      --grad: linear-gradient(135deg,#7c3aed,#3b82f6); --r: 16px; --r-sm: 10px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app  { display: flex; min-height: 100vh; }
    .main { flex: 1; padding: 24px 28px 40px 20px; overflow-y: auto; }

    /* Sidebar */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sb-brand { padding: 22px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .sb-logo  { width: 36px; height: 36px; background: var(--grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #fff; }
    .sb-name  { font-size: 15px; font-weight: 800; }
    .sb-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .sb-nav   { flex: 1; padding: 10px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 11px; cursor: pointer;
      color: var(--text2); font-size: 13px; font-weight: 500; border-radius: var(--r-sm);
      margin-bottom: 2px; position: relative;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(124,58,237,0.18); color: #fff; font-weight: 600; }
    .nav-item.active::before { content:''; position:absolute; left:0; top:20%; height:60%; width:3px; background:var(--grad); border-radius:0 3px 3px 0; }
    .nav-ico { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
    .nav-item.active .nav-ico { background: var(--grad); }
    .nav-badge { margin-left: auto; font-size: 9px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .nav-badge.live { background: rgba(16,217,160,0.12); color: var(--green); border: 1px solid rgba(16,217,160,0.2); }
    .sb-foot { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    /* Page header */
    .pg-hdr   { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .pg-title { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
    .pg-meta  { margin-left: auto; font-size: 11px; color: var(--text3); }
    .pill     { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
    .pill.live { background: rgba(16,217,160,0.12); color: var(--green); border: 1px solid rgba(16,217,160,0.2); }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
    .card-ttl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 16px; }

    /* Hero */
    .hero { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--purple); border-radius: var(--r); padding: 28px 32px; margin-bottom: 16px; }
    .hero-eye { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 8px; }
    .hero-num { font-size: 52px; font-weight: 900; letter-spacing: -2.5px; line-height: 1; }
    .hero-num.pos { color: var(--green); }
    .hero-num.neg { color: var(--red); }
    .hero-row { display: flex; gap: 32px; margin-top: 20px; }
    .hero-stat .val { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .hero-stat .lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* Balance cards */
    .bal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .bal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 22px; }
    .bal-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .bal-val   { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
    .bal-sub   { font-size: 11px; color: var(--text3); margin-top: 6px; }

    /* Chart */
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--purple); border-radius: var(--r); padding: 20px; margin-bottom: 16px; }
    .chart-hdr  { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .chart-ttl  { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
    .chart-num  { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-top: 4px; }
    .chart-num.pos { color: var(--green); }
    .chart-num.neg { color: var(--red); }

    /* KPI grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 22px; }
    .kpi-lbl  { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .kpi-val  { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
    .kpi-val.pos { color: var(--green); }
    .kpi-val.neg { color: var(--red); }
    .kpi-val.grad { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .kpi-sub  { font-size: 11px; color: var(--text3); margin-top: 6px; }

    /* Table */
    .log-wrap  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .log-hdr   { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .log-ttl   { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
    .log-ct    { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .log-scr   { max-height: 420px; overflow-y: auto; }
    .log-scr::-webkit-scrollbar { width: 4px; }
    .log-scr::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .log-tbl   { width: 100%; border-collapse: collapse; }
    .log-tbl th { text-align: left; padding: 9px 14px; font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 700; border-bottom: 1px solid var(--border); background: var(--surface2); position: sticky; top: 0; z-index: 1; }
    .log-tbl td { padding: 11px 14px; font-size: 12px; border-bottom: 1px solid var(--border); font-weight: 500; color: var(--text2); }
    .log-tbl tr:hover td { background: var(--surface2); color: var(--text); }
    .log-tbl tr:last-child td { border-bottom: none; }

    .badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; display: inline-block; }
    .badge.win  { background: rgba(16,217,160,0.12); color: var(--green); border: 1px solid rgba(16,217,160,0.18); }
    .badge.loss { background: rgba(244,63,94,0.12);  color: var(--red);   border: 1px solid rgba(244,63,94,0.18); }
    .badge.pend { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

    .pnl-pos { color: var(--green); font-weight: 700; }
    .pnl-neg { color: var(--red);   font-weight: 700; }

    /* Markets */
    .mkt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 24px 28px; margin-bottom: 14px; }
    .mkt-head { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .mkt-name { font-size: 20px; font-weight: 900; }
    .mkt-price { font-size: 14px; color: var(--text2); }
    .mkt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .mkt-item .lbl { font-size: 9px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .mkt-item .val { font-size: 22px; font-weight: 800; }
    .mkt-item .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .mkt-blocked    { font-size: 11px; color: var(--red); margin-top: 4px; }

    /* History */
    .hist-table { width: 100%; border-collapse: collapse; }
    .hist-table th { text-align: left; padding: 10px 16px; font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 700; border-bottom: 1px solid var(--border); }
    .hist-table td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text2); }
    .hist-table tr:last-child td { border-bottom: none; }
    .hist-name { font-weight: 700; color: var(--text); font-size: 14px; }
    .hist-note { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .stat-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .stat-row:last-child { border-bottom: none; }
    .stat-row .lbl { color: var(--text2); }
    .stat-row .val { font-weight: 700; }

    .loading { display: flex; align-items: center; justify-content: center; height: 400px; color: var(--text3); font-size: 13px; }

    /* Mobile */
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--surface); border-top: 1px solid var(--border); padding: 6px 0 env(safe-area-inset-bottom,6px); }
    .mobile-nav-inner { display: flex; justify-content: space-around; }
    .mob-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 10px; cursor: pointer; color: var(--text3); font-size: 10px; font-weight: 600; min-width: 52px; text-align: center; }
    .mob-item.active { color: var(--text); }
    .mob-ico { width: 32px; height: 32px; border-radius: 9px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .mob-item.active .mob-ico { background: var(--grad); }

    @media(max-width:900px) { .mkt-grid { grid-template-columns: repeat(2,1fr); } .kpi-grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:768px) { .sidebar { display:none; } .main { padding:16px 14px 90px; } .mobile-nav { display:block; } .bal-grid { grid-template-columns:1fr; } .kpi-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">AB</div>
      <div>
        <div class="sb-name">Arb Bot</div>
        <div class="sb-sub">Rebuild mode</div>
      </div>
    </div>
    <div class="sb-nav">
      <div class="nav-item active" data-page="overview" onclick="nav('overview')">
        <div class="nav-ico">⊞</div> Overview
      </div>
      <div class="nav-item" data-page="bot" onclick="nav('bot')">
        <div class="nav-ico">15</div> BTC 15-min
        <span class="nav-badge live">LIVE</span>
      </div>
      <div class="nav-item" data-page="markets" onclick="nav('markets')">
        <div class="nav-ico">⚡</div> Markets
      </div>
      <div class="nav-item" data-page="history" onclick="nav('history')">
        <div class="nav-ico">📁</div> History
      </div>
    </div>
    <div class="sb-foot">
      <div class="live-dot"></div> Syncs every 15 min
    </div>
  </nav>

  <div class="mobile-nav">
    <div class="mobile-nav-inner">
      <div class="mob-item active" data-page="overview" onclick="nav('overview')">
        <div class="mob-ico">⊞</div>Overview
      </div>
      <div class="mob-item" data-page="bot" onclick="nav('bot')">
        <div class="mob-ico">15</div>Bot
      </div>
      <div class="mob-item" data-page="markets" onclick="nav('markets')">
        <div class="mob-ico">⚡</div>Markets
      </div>
      <div class="mob-item" data-page="history" onclick="nav('history')">
        <div class="mob-ico">📁</div>History
      </div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
const DATA = 'https://raw.githubusercontent.com/IanSmith2005/polymarket-dashboard/main/data';
let curPage = 'overview';
let chartInst = null;
let mktTimer = null;

async function load(f) {
  try {
    const r = await fetch(`${DATA}/${f}.json?t=${Date.now()}`);
    if (!r.ok) throw r.status;
    return r.json();
  } catch(e) { return null; }
}

const fts = t => {
  if (!t) return '—';
  const d = new Date(t);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
};

const money  = v => v == null ? '—' : '$' + Math.abs(v).toFixed(2);
const signed = v => v == null ? '—' : (v >= 0 ? '+$' : '-$') + Math.abs(v).toFixed(2);
const cls    = v => v == null ? '' : v >= 0 ? 'pos' : 'neg';

function drawChart(canvasId, points, color) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const canvas = document.getElementById(canvasId);
  if (!canvas || !points.length) return;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 200);
  if (color === 'green') {
    grad.addColorStop(0, 'rgba(16,217,160,0.18)'); grad.addColorStop(1, 'rgba(16,217,160,0)');
  } else {
    grad.addColorStop(0, 'rgba(124,58,237,0.2)'); grad.addColorStop(1, 'rgba(124,58,237,0)');
  }
  const lc = color === 'green' ? '#10d9a0' : '#7c3aed';
  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: points.map(p => fts(p.ts)),
      datasets: [{
        data: points.map(p => p.y),
        borderColor: lc, backgroundColor: grad, fill: true,
        tension: 0.4, pointRadius: 0, pointHoverRadius: 4,
        pointHoverBackgroundColor: lc, pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2, borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0f0d27', titleColor: 'rgba(120,118,165,0.7)',
          bodyColor: '#f0efff', borderColor: 'rgba(255,255,255,0.07)',
          borderWidth: 1, cornerRadius: 10, padding: 10,
          callbacks: { label: c => (c.parsed.y >= 0 ? '+$' : '-$') + Math.abs(c.parsed.y).toFixed(2) }
        }
      },
      scales: {
        x: { ticks: { color: 'rgba(120,118,165,0.6)', maxTicksLimit: 6, font: { size: 10, family: 'Inter' } }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false } },
        y: { ticks: { color: 'rgba(120,118,165,0.6)', font: { size: 10, family: 'Inter' }, callback: v => '$' + v.toFixed(0) }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false } }
      },
      interaction: { intersect: false, mode: 'index' }
    }
  });
}

// ── Overview ────────────────────────────────────────────────────────────────

async function renderOverview() {
  const d = await load('overview');
  if (!d) { document.getElementById('main').innerHTML = '<div class="loading">Failed to load</div>'; return; }

  const total    = d.total || 0;
  const baseline = d.rebuild_baseline || 23.035;
  const since    = d.rebuild_since || '2026-04-21';
  const tradePnl = d.rebuild_trade_pnl || 0;
  const rebuildVal = baseline + tradePnl;

  const polyTotal   = (d.poly_usdc || 0) + (d.poly_positions || 0);
  const kalshiTotal = (d.kalshi_cash || 0) + (d.kalshi_positions || 0);

  // Build rebuild chart points: baseline + cumulative trade pnl, filtered to post-rebuild only
  const cum = d.combined_cumulative_pnl || [];
  const chartPoints = [{ ts: since + 'T00:00:00Z', y: baseline }];
  for (const pt of cum) {
    if (pt.ts >= since) {
      chartPoints.push({ ts: pt.ts, y: parseFloat((baseline + pt.cumulative).toFixed(2)) });
    }
  }

  document.getElementById('main').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">Overview</div>
      <div class="pg-meta">Updated ${fts(d.updated_at)}</div>
    </div>

    <div class="hero">
      <div class="hero-eye">Total Wallet · Rebuild since ${since}</div>
      <div class="hero-num ${rebuildVal >= baseline ? 'pos' : 'neg'}">$${rebuildVal.toFixed(2)}</div>
      <div class="hero-row">
        <div class="hero-stat">
          <div class="val" style="color:var(--green)">${signed(tradePnl)}</div>
          <div class="lbl">Trade P&L since reset</div>
        </div>
        <div class="hero-stat">
          <div class="val">$${baseline.toFixed(2)}</div>
          <div class="lbl">Baseline (${since})</div>
        </div>
        <div class="hero-stat">
          <div class="val">$${d.deposited ? d.deposited.toFixed(2) : '—'}</div>
          <div class="lbl">Total deposited</div>
        </div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-hdr">
        <div>
          <div class="chart-ttl">Wallet rebuild</div>
          <div class="chart-num ${rebuildVal >= baseline ? 'pos' : ''}">${'$'+rebuildVal.toFixed(2)}</div>
        </div>
      </div>
      <canvas id="rebuildChart" height="80"></canvas>
    </div>

    <div class="bal-grid">
      <div class="bal-card">
        <div class="bal-label">Polymarket</div>
        <div class="bal-val">$${polyTotal.toFixed(2)}</div>
        <div class="bal-sub">USDC $${(d.poly_usdc||0).toFixed(2)} · Positions $${(d.poly_positions||0).toFixed(2)}</div>
      </div>
      <div class="bal-card">
        <div class="bal-label">Kalshi</div>
        <div class="bal-val">$${kalshiTotal.toFixed(2)}</div>
        <div class="bal-sub">Cash $${(d.kalshi_cash||0).toFixed(2)} · Positions $${(d.kalshi_positions||0).toFixed(2)}</div>
      </div>
    </div>`;

  drawChart('rebuildChart', chartPoints, 'purple');
}

// ── BTC 15-min Bot ───────────────────────────────────────────────────────────

async function renderBot() {
  const d = await load('btc_15min');
  if (!d) { document.getElementById('main').innerHTML = '<div class="loading">Failed to load</div>'; return; }

  const k   = d.kpis;
  const cum = d.cumulative_pnl || [];
  const lastPnl = cum.length ? cum[cum.length - 1].cumulative : 0;
  const chartPts = cum.map(p => ({ ts: p.ts, y: p.cumulative }));

  const rows = (d.trades || []).slice(0, 20).map(t => {
    const dir = t.trade.includes('UP') ? '▲ UP + NO' : '▼ DOWN + YES';
    const outcome = !t.resolved ? '<span class="badge pend">Pending</span>'
      : t.outcome === 'WIN' ? '<span class="badge win">Win</span>'
      : '<span class="badge loss">Loss</span>';
    const pnlCls = (t.pnl_adjusted || 0) >= 0 ? 'pnl-pos' : 'pnl-neg';
    return `<tr>
      <td>${fts(t.ts)}</td>
      <td style="color:var(--text);font-weight:600">${dir}</td>
      <td>${t.units || '—'} units</td>
      <td>$${(t.dead_zone || 0).toFixed(1)}</td>
      <td>${t.profit_pct_raw ? t.profit_pct_raw.toFixed(1) + '%' : '—'}</td>
      <td>${outcome}</td>
      <td class="${pnlCls}">${t.resolved ? signed(t.pnl_adjusted) : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">BTC 15-min Bot</div>
      <div class="pill live">LIVE</div>
      <div class="pg-meta">Updated ${fts(d.updated_at)}</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-lbl">Total P&L</div>
        <div class="kpi-val ${cls(lastPnl)}">${signed(lastPnl)}</div>
        <div class="kpi-sub">${k.resolved} resolved trades</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">Win Rate</div>
        <div class="kpi-val grad">${k.win_rate.toFixed(1)}%</div>
        <div class="kpi-sub">${k.wins} wins · ${k.losses} losses</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">Avg P&L / Trade</div>
        <div class="kpi-val ${cls(k.avg_pnl_per_trade)}">${signed(k.avg_pnl_per_trade)}</div>
        <div class="kpi-sub">Avg raw profit ${k.avg_profit_pct_raw.toFixed(1)}%</div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-hdr">
        <div>
          <div class="chart-ttl">Cumulative P&L</div>
          <div class="chart-num ${cls(lastPnl)}">${signed(lastPnl)}</div>
        </div>
      </div>
      <canvas id="pnlChart" height="80"></canvas>
    </div>

    <div class="log-wrap">
      <div class="log-hdr">
        <div class="log-ttl">Trade History</div>
        <div class="log-ct">${k.total_trades} trades</div>
      </div>
      <div class="log-scr">
        <table class="log-tbl">
          <thead><tr>
            <th>Time</th><th>Direction</th><th>Size</th>
            <th>Dead Zone</th><th>Profit</th><th>Outcome</th><th>P&L</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:30px">No trades yet</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;

  drawChart('pnlChart', chartPts, 'green');
}

// ── Markets ──────────────────────────────────────────────────────────────────

function calcUnits15min(dz) {
  if (dz > 15) return 0;
  if (dz <= 3) return 15;
  if (dz <= 7) return 10;
  return 5;
}

async function renderMarkets() {
  if (mktTimer) { clearInterval(mktTimer); mktTimer = null; }
  document.getElementById('main').innerHTML = `
    <div class="pg-hdr"><div class="pg-title">Markets</div><div class="pg-meta">Loading…</div></div>
    <div class="loading">Fetching live market data…</div>`;
  await doMarketsFetch();
  mktTimer = setInterval(() => { if (curPage === 'markets') doMarketsFetch(); }, 60000);
}

async function doMarketsFetch() {
  const [mktData, btcRes] = await Promise.allSettled([
    load('markets'),
    fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r => r.json()).then(d => parseFloat(d.price)),
  ]);
  const mkts  = mktData.status === 'fulfilled' ? mktData.value : null;
  const btcP  = btcRes.status === 'fulfilled' ? btcRes.value : null;
  const btcAsset = mkts?.assets?.find(a => a.asset === 'BTC');

  let card = '';
  if (!btcAsset) {
    card = `<div class="mkt-card"><div class="mkt-name">BTC 15-min</div><div style="margin-top:12px;color:var(--text3)">Waiting for Pi sync…</div></div>`;
  } else {
    const trades = btcAsset.trades || [];
    const best = trades.find(t => t.qualified) || trades[0];

    const livePrice = btcP || btcAsset.price;
    const kalshiLevel = best?.kalshi_level;
    const dz = best?.dead_zone ?? (livePrice && kalshiLevel ? Math.abs(livePrice - kalshiLevel) : null);
    const units = dz != null ? calcUnits15min(dz) : '—';
    const qualified = dz != null && dz <= 15 && (best?.profit_pct || 0) >= 12;
    const blockReason = dz == null ? 'No data'
      : dz > 15 ? `DZ $${dz.toFixed(0)} > max $15`
      : (best?.profit_pct || 0) < 12 ? `Profit ${(best?.profit_pct||0).toFixed(1)}% < min 12%`
      : null;

    const polyTarget = best
      ? (best.direction.includes('UP') ? `BUY UP @ $${best.poly_price?.toFixed(2)||'—'}` : `BUY DOWN @ $${best.poly_price?.toFixed(2)||'—'}`)
      : '—';

    const dzColor = dz == null ? 'var(--text3)'
      : dz <= 3 ? 'var(--green)' : dz <= 7 ? '#fbbf24' : dz <= 15 ? '#fb923c' : 'var(--red)';

    const mktAge = mkts?.updated_at
      ? Math.round((Date.now() - new Date(mkts.updated_at)) / 60000) + 'min ago'
      : '—';

    card = `
    <div class="mkt-card">
      <div class="mkt-head">
        <div class="mkt-name">BTC 15-min</div>
        ${livePrice ? `<div class="mkt-price">BTC $${Math.round(livePrice).toLocaleString()}</div>` : ''}
        <div class="badge ${qualified ? 'win' : 'loss'}" style="margin-left:auto">${qualified ? 'WOULD TRADE' : 'BLOCKED'}</div>
      </div>
      <div class="mkt-grid">
        <div class="mkt-item">
          <div class="lbl">Poly Target</div>
          <div class="val" style="font-size:16px;margin-top:4px">${polyTarget}</div>
          <div class="sub">${best?.direction || '—'}</div>
        </div>
        <div class="mkt-item">
          <div class="lbl">Closest Kalshi Level</div>
          <div class="val">$${kalshiLevel ? Math.round(kalshiLevel).toLocaleString() : '—'}</div>
          <div class="sub">${best?.kalshi_price != null ? 'Price $'+best.kalshi_price.toFixed(2) : ''}</div>
        </div>
        <div class="mkt-item">
          <div class="lbl">Dead Zone</div>
          <div class="val" style="color:${dzColor}">$${dz != null ? dz.toFixed(0) : '—'}</div>
          ${blockReason ? `<div class="mkt-blocked">${blockReason}</div>` : '<div class="sub" style="color:var(--green)">Within range</div>'}
        </div>
        <div class="mkt-item">
          <div class="lbl">Allowed Bet Size</div>
          <div class="val" style="color:${qualified?'var(--green)':'var(--text3)'}">${units === 0 ? 'SKIP' : units + ' units'}</div>
          <div class="sub">DZ≤3→15u · DZ≤7→10u · DZ≤15→5u</div>
        </div>
      </div>
      <div style="margin-top:16px;font-size:11px;color:var(--text3)">Kalshi data ${mktAge} · refreshes 60s</div>
    </div>`;
  }

  const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('main').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">Markets</div>
      <div class="pg-meta">Last ${now}</div>
    </div>
    ${card}`;
}

// ── History ──────────────────────────────────────────────────────────────────

async function renderHistory() {
  const [btcH, ethL] = await Promise.all([load('btc_hourly'), load('eth_live')]);

  const archivedBots = [
    { name: 'BTC Hourly', note: 'Disabled — concurrent bug caused wallet loss', data: btcH, since: 'Post-fix only (2026-04-21+)' },
    { name: 'ETH Hourly', note: 'Disabled — clean, re-enable after rebuild', data: ethL, since: 'All-time' },
  ];

  const rows = archivedBots.map(b => {
    const k = b.data?.kpis;
    if (!k) return `<tr>
      <td><div class="hist-name">${b.name}</div><div class="hist-note">${b.note}</div></td>
      <td colspan="4" style="color:var(--text3)">No data</td>
    </tr>`;
    return `<tr>
      <td><div class="hist-name">${b.name}</div><div class="hist-note">${b.note}</div></td>
      <td style="font-weight:700">${k.total_trades}</td>
      <td style="font-weight:700">${k.win_rate.toFixed(1)}%</td>
      <td class="${k.total_pnl_adjusted >= 0 ? 'pnl-pos' : 'pnl-neg'}">${signed(k.total_pnl_adjusted)}</td>
      <td style="color:var(--text3)">${b.since}</td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">History</div>
    </div>

    <div class="log-wrap" style="margin-bottom:16px">
      <div class="log-hdr">
        <div class="log-ttl">Archived Bots</div>
      </div>
      <table class="hist-table">
        <thead><tr>
          <th>Bot</th><th>Trades</th><th>Win Rate</th><th>Total P&L</th><th>Period</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-ttl">All-Time Summary</div>
      <div class="stat-row"><span class="lbl">BTC Hourly (172 post-fix trades)</span><span class="val pnl-pos">+$68.89 · 97.1% win rate</span></div>
      <div class="stat-row"><span class="lbl">ETH Hourly (42 trades)</span><span class="val pnl-pos">+$19.63 · 95.2% win rate</span></div>
      <div class="stat-row"><span class="lbl">BTC 15-min (20 pre-rebuild trades)</span><span class="val pnl-pos">+$44.46 · 100% win rate</span></div>
      <div class="stat-row"><span class="lbl">Total deposited</span><span class="val">$174.34</span></div>
      <div class="stat-row"><span class="lbl">Rebuild started</span><span class="val">2026-04-21 (wallet at $23.04)</span></div>
    </div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────

function nav(pg) {
  if (pg !== 'markets' && mktTimer) { clearInterval(mktTimer); mktTimer = null; }
  curPage = pg;
  window.location.hash = '#/' + pg;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === pg));
  document.querySelectorAll('.mob-item').forEach(el => el.classList.toggle('active', el.dataset.page === pg));
  document.getElementById('main').innerHTML = '<div class="loading">Loading…</div>';
  if (pg === 'overview') renderOverview();
  else if (pg === 'bot') renderBot();
  else if (pg === 'markets') renderMarkets();
  else if (pg === 'history') renderHistory();
}

function handleHash() {
  const h = window.location.hash.replace('#/', '').replace('#', '');
  const valid = ['overview', 'bot', 'markets', 'history'];
  nav(valid.includes(h) ? h : 'overview');
}

window.addEventListener('hashchange', handleHash);
handleHash();
setInterval(() => {
  if (curPage === 'overview') renderOverview();
  else if (curPage === 'bot') renderBot();
}, 300000);
</script>
</body>
</html>
